name: Free Windows RDP via Tailscale

on:
  workflow_dispatch: # لتشغيل الجهاز يدوياً

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360 # يعمل حتى 6 ساعات

    steps:
      # 1. تحميل وتثبيت التايل سكيل مباشرة عبر الباورشيل (لتجنب خطأ لينكس)
      - name: Download and Install Tailscale
        shell: powershell
        run: |
          echo "جاري تحميل وتثبيت Tailscale..."
          Invoke-WebRequest -Uri https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile tailscale-setup.exe
          Start-Process -FilePath .\tailscale-setup.exe -ArgumentList "/qn" -Wait
          echo "تم التثبيت بنجاح!"

      # 2. ربط الجهاز بحسابك باستخدام الـ Auth Key الخاص بك
      - name: Connect to Tailscale Network
        shell: powershell
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          echo "جاري الاتصال بشبكة تايل سكيل..."
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --accept-routes
          echo "تم الاتصال بالشبكة بنجاح!"

      # 3. فتح الـ RDP وتغيير كلمة مرور جهاز الجيت هاب
      - name: Enable RDP and Setup User
        shell: powershell
        run: |
          echo "جاري تفعيل الـ RDP وفتح جدار الحماية..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # تعيين كلمة المرور للمستخدم الافتراضي
          $Password = ConvertTo-SecureString "GitHubRDP@2026" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password
          
          echo "=========================================="
          echo "تم التجهيز! بيانات الدخول هي:"
          echo "Username: runneradmin"
          echo "Password: GitHubRDP@2026"
          echo "=========================================="

      # 4. منع إغلاق الـ Action ليبقى الجهاز يعمل
      - name: Keep Alive Loop
        shell: powershell
        run: |
          echo "الجهاز متصل الآن ومستعد لاستقبال اتصالك عبر الـ RDP..."
          $hours = 6
          for ($i = 0; $i -lt ($hours * 60); $i++) {
              Start-Sleep -Seconds 60
          }
