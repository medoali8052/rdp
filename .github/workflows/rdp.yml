name: Free Windows RDP via Tailscale

on:
  workflow_dispatch: # لتشغيل الجهاز يدوياً في أي وقت

jobs:
  build:
    runs-on: windows-latest # هنا نطلب من جيت هاب تجهيز جهاز ويندوز سيرفر
    timeout-minutes: 360 # أقصى مدة تشغيل (6 ساعات)

    steps:
      # 1. تحميل وتثبيت التايل سكيل على جهاز جيت هاب
      - name: Download and Install Tailscale
        shell: powershell
        run: |
          Invoke-WebRequest -Uri https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile tailscale-setup.exe
          Start-Process -FilePath .\tailscale-setup.exe -ArgumentList "/qn" -Wait

      # 2. ربط جهاز جيت هاب بحسابك في تايل سكيل
      - name: Connect to Tailscale
        shell: powershell
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --accept-routes

      # 3. تفعيل خاصية الـ RDP داخل جهاز الويندوز وتعيين كلمة مرور
      - name: Enable RDP and Set Password
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # تغيير كلمة مرور المستخدم الحالي (runneradmin)
          $Password = ConvertTo-SecureString "GitHubRDP@2026" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password
          
          echo "=========================================="
          echo "Username: runneradmin"
          echo "Password: GitHubRDP@2026"
          echo "=========================================="

      # 4. جعل الجهاز مستيقظاً ولا يغلق الـ Action فوراً
      - name: Keep Alive Loop
        shell: powershell
        run: |
          $hours = 6
          for ($i = 0; $i -lt ($hours * 60); $i++) {
              Start-Sleep -Seconds 60
              Write-Output "الجهاز يعمل بنجاح... دقيقة رقم: $i"
          }
